<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Report Zone Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="addin.css">
    <script src="https://cdn.jsdelivr.net/npm/mg-api-js"></script>
</head>
<body>
    <div id="terminalReportZones">
        <div class="header">
            <div class="container">
                <div class="header-content">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <img src="https://cdn.baseline.is/static/content/logos/mDtvptChQ3XwBLuxuu5hip-lala.svg"
                                 alt="Logo" class="company-logo"
                                 onerror="this.style.display='none';">
                        </div>
                        <div class="col">
                            <h1 class="header-title">
                                <i class="fas fa-map-marked-alt me-2"></i>Terminal Report Zone Manager
                            </h1>
                        </div>
                        <div class="col-auto">
                            <div class="header-buttons">
                                <button class="btn btn-refresh" onclick="refreshZones()">
                                    <i class="fas fa-sync-alt me-2"></i>Refresh
                                </button>
                                <button class="btn btn-create-zone" onclick="openCreateZone()">
                                    <i class="fas fa-plus me-2"></i>Create Zone
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container main-container">
            <div id="alertContainer"></div>
            
            <div class="row">
                <!-- Regular Zones -->
                <div class="col-lg-6 mb-4">
                    <div class="zone-container p-3" id="regularZones" 
                         ondrop="drop(event, 'regular')" 
                         ondragover="allowDrop(event)"
                         ondragenter="dragEnter(event)"
                         ondragleave="dragLeave(event)">
                        <div class="zone-header">
                            <h4><i class="fas fa-layer-group me-2"></i>All Zones</h4>
                            <div class="zone-count" id="regularCount">0 zones</div>
                        </div>
                        <div class="search-container">
                            <input type="text" class="form-control search-input" id="regularSearch" 
                                   placeholder="Search all zones..." onkeyup="filterZones('regular')">
                        </div>
                        <div id="regularZonesList">
                            <div class="loading-spinner">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Terminal Report Zones -->
                <div class="col-lg-6 mb-4">
                    <div class="zone-container p-3" id="terminalZones" 
                         ondrop="drop(event, 'terminal')" 
                         ondragover="allowDrop(event)"
                         ondragenter="dragEnter(event)"
                         ondragleave="dragLeave(event)">
                        <div class="zone-header aqua">
                            <h4><i class="fas fa-file-alt me-2"></i>Terminal Report Zones</h4>
                            <div class="zone-count" id="terminalCount">0 zones</div>
                        </div>
                        <div class="search-container">
                            <input type="text" class="form-control search-input aqua" id="terminalSearch" 
                                   placeholder="Search terminal report zones..." onkeyup="filterZones('terminal')">
                        </div>
                        <div id="terminalZonesList">
                            <div class="loading-spinner">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="addin.js"></script>
</body>
</html>
